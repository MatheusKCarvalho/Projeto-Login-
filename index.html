<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p id="mensagemLogin"></p>
    <div id="perfilUsuario">

        <h1>Perfil<h1>
        <p id="perfilNome"></p>
        <p id="perfilEmail"></p>

    </div>
    <input id="inputNovoNome" type="text" placeholder="Insira seu novo nome">
    <button id="btnSalvaNome">Salvar Nome</button>
    <button id="btnLogin">Login</button>
    <div id="popupLogin" class="popup">
        <div class="popupLogin">
            <p>Login</p>
            <button id="sairLogin">X</button>
            <input id="inputUsuario" type="text" placeholder="User">
            <input id="inputSenha" type="password" placeholder="Password">
            <button id="entrar">Entrar</button>
        </div>
    </div>
    <input id="inputNovaSenha" type="text" placeholder="Insira sua nova senha">
    <button id="btnSalvaSenha">Salvar Senha</button>
    <button id="deletarConta">Deletar Conta</button>
    <button id="btnSair">Sair</button>
    <button id="btnSing">Sign up</button>
    <div id="popupSingUp" class="popup">
        <div>
            <p id="mensagemSing"></p>
            <p>Sign Up</p>
            <button id="sairSing">X</button>
            <input id="inputEmail" type="email" placeholder="Email">
            <input id="inputUser" type="text" placeholder="User">
            <input id="inputPassword" type="password" placeholder="Password">
            <button id="criarUser">Criar</button>
        </div>

    </div>
    <style src="style.css"></style>
    <script src="script.js"></script>
</body>
</html>
